<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interactive Country Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-extra-markers/dist/css/leaflet.extra-markers.min.css" />

    <!-- MarkerCluster CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <!-- Bootstrap CSS for modals -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        html, body {
            height: 100%;
            margin: 0;
        }
        #map {
            height: 100%;
            width: 100%;
        }
        .floating-select {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 260px;
            z-index: 9999;
        }
        .modal-body {
            max-height: 70vh;
            overflow-y: auto;
        }
        .floating-buttons {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            gap: 10px;
        }
    </style>
</head>
<body>

    <!-- Country Selector -->
    <select id="countrySelect" class="form-select floating-select">
        <option value="">Select a country...</option>
    </select>

    <!-- Buttons for News & Calculator -->
    <div class="floating-buttons">
        <button id="showNewsBtn" class="btn btn-info btn-sm">Local News</button>
        <button id="showCalculatorBtn" class="btn btn-primary btn-sm">Currency Converter</button>
    </div>

    <!-- Map -->
    <div id="map"></div>

    <!-- Info Modal -->
    <div class="modal fade" id="infoModal" tabindex="-1" aria-labelledby="infoModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Country Info</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p><strong>Capital:</strong> <span id="capital"></span></p>
                    <p><strong>Population:</strong> <span id="population"></span></p>
                    <p><strong>Currency:</strong> <span id="currency"></span></p>
                    <p><strong>Exchange Rate:</strong> <span id="exchangeRate"></span></p>
                    <p><a id="wikiLink" href="#" target="_blank">Wikipedia Link</a></p>
                </div>
            </div>
        </div>
    </div>

<!-- Weather Modal -->
<div class="modal fade" id="weatherModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="fa fa-cloud-sun"></i> Weather Forecast</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="weatherModalBody">
                <div id="currentWeather" class="mb-3 d-flex align-items-center">
                    <img id="weatherIcon" src="" alt="Weather Icon" style="width:60px;height:60px;margin-right:15px;">
                    <div>
                        <p id="currentTemp" class="mb-1 fs-5"></p>
                        <p id="currentDesc" class="mb-0" style="font-size:14px;"></p>
                    </div>
                </div>

                <div id="forecastContainer" class="d-flex flex-wrap gap-2 justify-content-start">
                    <!-- Forecast cards injected here -->
                </div>
            </div>
        </div>
    </div>
</div>



    <!-- Currency Calculator Modal -->
    <div class="modal fade" id="calculatorModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Currency Converter</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="number" id="amountInput" class="form-control mb-2" placeholder="Amount">
                    <button id="calculateBtn" class="btn btn-primary mb-2">Convert</button>
                    <p id="convertedResult"></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Local News Modal -->
    <div class="modal fade" id="newsModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Local News</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="newsModalBody"></div>
            </div>
        </div>
    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-extra-markers/dist/js/leaflet.extra-markers.min.js"></script>

    <!-- MarkerCluster -->
    <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

    <!-- EasyButton -->
    <script src="https://cdn.jsdelivr.net/npm/leaflet-easybutton@2/src/easy-button.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-easybutton@2/src/easy-button.css">

    <!-- Custom JS -->
    <script src="js/script.js"></script>

    <script>
        // Connect floating buttons to modals
        $('#showNewsBtn').on('click', function(){
            const code = $('#countrySelect').val();
            if(code) loadLocalNews(code);
            else alert("Please select a country first.");
        });

        $('#showCalculatorBtn').on('click', function(){
            if(!currentCountryInfo.exchangeRate) {
                alert("Please select a country with a valid currency.");
                return;
            }
            $('#calculatorModal').modal('show');
        });
    </script>
</body>
</html>
