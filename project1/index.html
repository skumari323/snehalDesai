<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interactive Country Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet-extra-markers/dist/css/leaflet.extra-markers.min.css">

    <!-- MarkerCluster CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <style>
        html, body {
            height: 100%;
            margin: 0;
        }
        #map {
            height: 100%;
            width: 100%;
        }
        .floating-select {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 260px;
            z-index: 9999;
        }
        .modal-body {
            max-height: 70vh;
            overflow-y: auto;
        }
    </style>
</head>

<body>

    <!-- Country Selector -->
    <select id="countrySelect" class="form-select floating-select">
        <option value="">Select a country...</option>
    </select>

    <!-- Map -->
    <div id="map"></div>

    <!-- ============================
         INFO MODAL
    ============================= -->
    <div class="modal fade" id="infoModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Country Info</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p><strong>Capital:</strong> <span id="capital"></span></p>
                    <p><strong>Population:</strong> <span id="population"></span></p>
                    <p><strong>Currency:</strong> <span id="currency"></span></p>
                    <p><strong>Exchange Rate:</strong> <span id="exchangeRate"></span></p>
                    <p><a id="wikiLink" href="#" target="_blank">Wikipedia Link</a></p>
                </div>
            </div>
        </div>
    </div>

    <!-- WEATHER MODAL -->
    <div class="modal fade" id="weatherModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fa fa-cloud-sun"></i> Weather Forecast</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="currentWeather" class="mb-3 d-flex align-items-center">
                        <img id="weatherIcon" style="width:60px;height:60px;margin-right:15px;">
                        <div>
                            <p id="currentTemp" class="mb-1 fs-5"></p>
                            <p id="currentDesc" class="mb-0"></p>
                        </div>
                    </div>
                    <div id="forecastContainer" class="d-flex flex-wrap gap-2"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- CURRENCY MODAL -->
    <div class="modal fade" id="calculatorModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Currency Converter</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input id="amountInput" type="number" class="form-control mb-2" placeholder="Amount">
                    <button id="calculateBtn" class="btn btn-primary mb-2">Convert</button>
                    <p id="convertedResult"></p>
                </div>
            </div>
        </div>
    </div>

    <!-- NEWS MODAL -->
    <div class="modal fade" id="newsModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Local News</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="newsModalBody"></div>
            </div>
        </div>
    </div>

    <!-- JS -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-extra-markers/dist/js/leaflet.extra-markers.min.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/leaflet-easybutton@2/src/easy-button.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-easybutton@2/src/easy-button.css">

    <script src="js/script.js"></script>
</body>
</html>
