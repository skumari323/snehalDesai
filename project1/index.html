<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Gazetteer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Leaflet -->
<link rel="stylesheet" href="css/leaflet.css">

<!-- MarkerCluster -->
<link rel="stylesheet" href="css/MarkerCluster.min.css">
<link rel="stylesheet" href="css/MarkerCluster.Default.min.css">

<!-- Bootstrap -->
<link rel="stylesheet" href="css/bootstrap.min.css">

<!-- FontAwesome -->
<link rel="stylesheet" href="css/all.min.css">

<!-- Extra markers -->
<link rel="stylesheet" href="css/leaflet.extra-markers.min.css">

<!-- Easy Button -->
<link rel="stylesheet" href="css/easy-button.min.css">

<!-- Custom -->
<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div id="pre-load"></div>

<select id="countrySelect" class="form-select floating-select">
<option value="">Select a country...</option>
</select>

<div id="map"></div>

<!-- INFO MODAL -->
<div class="modal fade" id="infoModal">
<div class="modal-dialog modal-lg">
<div class="modal-content">

<div class="modal-header">
<h5 class="modal-title">Country Info</h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">

<p><strong>Capital:</strong> <span id="capital"></span></p>
<p><strong>Population:</strong> <span id="population"></span></p>
<p><strong>Currency:</strong> <span id="currency"></span></p>
<p><strong>Exchange Rate:</strong> <span id="exchangeRate"></span></p>
<p><a id="wikiLink" href="#" target="_blank">Wikipedia</a></p>

</div>
</div>
</div>
</div>


<!-- WEATHER MODAL -->
<div class="modal fade" id="weatherModal">
<div class="modal-dialog modal-lg">
<div class="modal-content">

<div class="modal-header">
<h5 class="modal-title">Weather Forecast</h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">

<div id="currentWeather" class="mb-3 d-flex align-items-center">

<img id="weatherIcon" style="width:60px;height:60px;margin-right:15px">

<div>
<p id="currentTemp"></p>
<p id="currentDesc"></p>
</div>

</div>

<div id="forecastContainer" class="d-flex flex-wrap gap-2"></div>

</div>
</div>
</div>
</div>


<!-- CURRENCY MODAL -->
<div class="modal fade" id="calculatorModal">
<div class="modal-dialog">
<div class="modal-content">

<div class="modal-header">
<h5 class="modal-title">Currency Converter</h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">

<select id="fromCurrency" class="form-select mb-2"></select>
<select id="toCurrency" class="form-select mb-2"></select>

<input id="amountInput" type="number" class="form-control mb-2" placeholder="Amount">

<button id="calculateBtn" class="btn btn-primary mb-2">Convert</button>

<p id="convertedResult"></p>

</div>
</div>
</div>
</div>


<!-- NEWS MODAL -->
<div class="modal fade" id="newsModal">
<div class="modal-dialog modal-lg">
<div class="modal-content">

<div class="modal-header">
<h5 class="modal-title">Local News</h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body" id="newsModalBody"></div>

</div>
</div>
</div>


<!-- HOLIDAYS MODAL -->
<div class="modal fade" id="holidaysModal">
<div class="modal-dialog modal-lg">
<div class="modal-content">

<div class="modal-header">
<h5 class="modal-title">Public Holidays</h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body" id="holidaysModalBody"></div>

</div>
</div>
</div>


<!-- JS LIBRARIES -->

<script src="js/jquery.min.js"></script>
<script src="js/bootstrap.min.js"></script>
<script src="js/leaflet.js"></script>
<script src="js/leaflet.markercluster.js"></script>
<script src="js/leaflet.extra-markers.min.js"></script>
<script src="js/easy-button.min.js"></script>

<script src="js/script.js"></script>

</body>
</html>
