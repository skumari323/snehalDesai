<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Map Explorer</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-easybutton@2/src/easy-button.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css"/>
</head>
<body>

<!-- Sidebar toggle button -->
<div id="sidebarToggle">
    <i class="fa fa-bars"></i>
</div>

<!-- Sidebar -->
<div id="sidebar">
    <h4>Select Country</h4>
    <select id="countrySelect" class="form-select mb-3">
        <option value="">-- Choose a Country --</option>
    </select>

    <div id="countryInfo">
        <h5>Country Info</h5>
        <p><strong>Capital:</strong> <span id="capital"></span></p>
        <p><strong>Population:</strong> <span id="population"></span></p>
        <p><strong>Currency:</strong> <span id="currency"></span></p>
        <p><strong>Exchange Rate (USD):</strong> <span id="exchangeRate"></span></p>
        <p><strong>Weather:</strong> <span id="weather"></span></p>
        <p><strong>Wikipedia:</strong> <a id="wikiLink" href="#" target="_blank">Read More</a></p>
    </div>
</div>

<!-- Map -->
<div id="map"></div>

<!-- JS Libraries -->
<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet-easybutton@2/src/easy-button.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="js/script.js"></script>

</body>
</html>
