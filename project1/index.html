<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gazetteer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="css/leaflet.css">
    <link rel="stylesheet" href="css/leaflet.extra-markers.min.css">


    <!-- MarkerCluster CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Bootstrap 5.3.6 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css">

    <!-- Leaflet EasyButton CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-easybutton@2/src/easy-button.css">

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
    <link rel="apple-touch-icon" href="favicon/apple-touch-icon.png">
    <link rel="manifest" href="favicon/site.webmanifest">

    <!-- Numeral.js for number formatting -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/numeral.js/2.0.6/numeral.min.js"></script>

    <!-- date-fns for date formatting -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/date-fns/2.30.0/date-fns.min.js"></script>

    <!-- External CSS -->
    <link rel="stylesheet" href="css/style.css">

</head>
<body>

    <!-- Country Selector -->
    <select id="countrySelect" class="form-select floating-select">
        <option value="">Select a country...</option>
    </select>

    <!-- Map -->
    <div id="map"></div>

    <!-- ============================ INFO MODAL ============================ -->
    <div class="modal fade" id="infoModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Country Info</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p><strong>Capital:</strong> <span id="capital"></span></p>
                    <p><strong>Population:</strong> <span id="population"></span></p>
                    <p><strong>Currency:</strong> <span id="currency"></span></p>
                    <p><strong>Exchange Rate:</strong> <span id="exchangeRate"></span></p>
                    <p><a id="wikiLink" href="#" target="_blank">Wikipedia Link</a></p>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================ WEATHER MODAL ============================ -->
    <div class="modal fade" id="weatherModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fa fa-cloud-sun"></i> Weather Forecast</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div id="currentWeather" class="mb-3 d-flex align-items-center">
                        <!-- Weather icon from OpenWeatherMap -->
                        <img id="weatherIcon" style="width:60px;height:60px;margin-right:15px;" alt="Weather Icon">
                        <div>
                            <p id="currentTemp" class="mb-1 fs-5"></p>
                            <p id="currentDesc" class="mb-0"></p>
                        </div>
                    </div>
                    <div id="forecastContainer" class="d-flex flex-wrap gap-2"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================ CURRENCY MODAL ============================ -->
    <div class="modal fade" id="calculatorModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Currency Converter</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <input id="amountInput" type="number" class="form-control mb-2" placeholder="Amount">
                    <button id="calculateBtn" class="btn btn-primary mb-2">Convert</button>
                    <p id="convertedResult"></p>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================ NEWS MODAL ============================ -->
    <div class="modal fade" id="newsModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Local News</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="newsModalBody"></div>
            </div>
        </div>
    </div>

    <!-- ============================ PUBLIC HOLIDAYS MODAL ============================ -->
    <div class="modal fade" id="holidaysModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Public Holidays</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="holidaysModalBody">
                    <p>Loading holidays...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================ JS ============================ -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-extra-markers/dist/js/leaflet.extra-markers.min.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet-easybutton@2/src/easy-button.js"></script>
    <script src="js/script.js"></script>

</body>
</html>
