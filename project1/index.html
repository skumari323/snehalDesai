<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Gazetteer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS -->
  <link rel="stylesheet" href="css/leaflet.css">
  <link rel="stylesheet" href="css/toastify.min.css">
  <link rel="stylesheet" href="css/MarkerCluster.Default.min.css">
  <link rel="stylesheet" href="css/MarkerCluster.min.css">
  <link rel="stylesheet" href="css/leaflet.extra-markers.min.css">
  <link rel="stylesheet" href="css/all.min.css">
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <link rel="stylesheet" href="css/easy-button.min.css">
  <link rel="stylesheet" href="css/style.css">

  <!-- Favicon -->
  <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
  <link rel="manifest" href="favicon/site.webmanifest">
</head>

<body>

  <!-- PRELOADER -->
  <div id="preloader"></div>

  <!-- COUNTRY SELECT -->
  <select id="countrySelect" class="form-select floating-select">
    <option value="">Select a country...</option>
  </select>

  <!-- MAP -->
  <div id="map"></div>

  <!-- ===================== MODALS ===================== -->

  <!-- INFO -->
  <div class="modal fade" id="infoModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Country Info</h5>
          <button class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <p><strong>Capital:</strong> <span id="capital"></span></p>
          <p><strong>Population:</strong> <span id="population"></span></p>
          <p><strong>Currency:</strong> <span id="currency"></span></p>
          <p><strong>Exchange Rate:</strong> <span id="exchangeRate"></span></p>
          <p><a id="wikiLink" href="#" target="_blank">Wikipedia</a></p>
        </div>
      </div>
    </div>
  </div>

  <!-- WEATHER -->
  <div class="modal fade" id="weatherModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Weather Forecast</h5>
          <button class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">

          <div class="d-flex align-items-center mb-3">
            <img id="weatherIcon" alt="Weather icon" style="width:60px;height:60px;margin-right:15px">
            <div>
              <p id="currentTemp"></p>
              <p id="currentDesc"></p>
            </div>
          </div>

          <div id="forecastContainer" class="d-flex flex-wrap gap-2"></div>

        </div>
      </div>
    </div>
  </div>

  <!-- CURRENCY -->
  <div class="modal fade" id="calculatorModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Currency Converter</h5>
          <button class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <select id="fromCurrency" class="form-select mb-2"></select>
          <select id="toCurrency" class="form-select mb-2"></select>
          <input id="amountInput" type="number" class="form-control mb-2" placeholder="Amount">
          <button id="calculateBtn" class="btn btn-primary mb-2">Convert</button>
          <p id="convertedResult"></p>
        </div>
      </div>
    </div>
  </div>

  <!-- NEWS -->
  <div class="modal fade" id="newsModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Local News</h5>
          <button class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="newsModalBody"></div>
      </div>
    </div>
  </div>

  <!-- HOLIDAYS -->
  <div class="modal fade" id="holidaysModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Public Holidays</h5>
          <button class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="holidaysModalBody"></div>
      </div>
    </div>
  </div>

  <!-- JS -->
  <script src="js/libs/jquery.min.js"></script>
  <script src="js/libs/bootstrap.min.js"></script>
  <script src="js/libs/leaflet.js"></script>
  <script src="js/libs/leaflet.markercluster.js"></script>
  <script src="js/libs/leaflet.extra-markers.min.js"></script>
  <script src="js/libs/easy-button.min.js"></script>
  <script src="js/libs/toastify.min.js"></script>
  <script src="js/libs/numeral.min.js"></script>
  <script src="js/libs/date.min.js"></script>
  <script src="js/script.js"></script>

</body>
</html>
