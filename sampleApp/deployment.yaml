apiVersion: apps/v1
kind: Deployment
metadata:
  name: sampleapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sampleapp
  template:
    metadata:
      labels:
        app: sampleapp
    spec:
      containers:
      - name: sampleapp
        image: nginx   # FIXED (since you skipped Docker)
        ports:
        - containerPort: 80

---

apiVersion: v1
kind: Service
metadata:
  name: sampleapp-svc
spec:
  type: NodePort
  selector:
    app: sampleapp
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
