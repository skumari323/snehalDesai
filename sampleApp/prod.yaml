apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-app-prod
  template:
    metadata:
      labels:
        app: demo-app-prod
    spec:
      containers:
        - name: demo-app
          image: demo-app:latest
          ports:
            - containerPort: 3000
