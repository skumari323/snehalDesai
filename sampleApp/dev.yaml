apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-app-dev
  template:
    metadata:
      labels:
        app: demo-app-dev
    spec:
      containers:
        - name: demo-app
          image: demo-app:latest
          ports:
            - containerPort: 3000
